<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc13fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#151515" stroke="url(#neonGradient)" stroke-width="1"/>

  <!-- Icon Centered -->
  <g transform="translate(20, 20)">
    <path d="M30 0 L55 15 L55 45 L30 60 L5 45 L5 15 Z" fill="url(#neonGradient)" opacity="0.1"/>
    <path d="M15 15 L25 21 L25 48 L15 42 Z" fill="url(#neonGradient)" filter="url(#glow)"/>
    <path d="M15 15 L25 21 L35 15 L25 9 Z" fill="#fff" opacity="0.5"/>
    <path d="M30 33 L45 20 L50 23 L35 36 Z" fill="url(#neonGradient)" filter="url(#glow)"/>
    <path d="M32 38 L48 50 L43 53 L28 41 Z" fill="url(#neonGradient)" filter="url(#glow)"/>
    <path d="M28 25 L38 31 L38 40 L28 34 Z" fill="#00f3ff" />

    <!-- Hard Slices -->
    <line x1="14" y1="19" x2="26" y2="25" stroke="#151515" stroke-width="2" />
    <line x1="14" y1="27" x2="26" y2="33" stroke="#151515" stroke-width="2" />
    <line x1="14" y1="35" x2="26" y2="41" stroke="#151515" stroke-width="2" />
  </g>
</svg>
